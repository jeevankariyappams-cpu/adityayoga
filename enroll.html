<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enroll Yoga</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:linear-gradient(to right,#d4fc79,#96e6a1);
}

.container{
max-width:450px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#333;
}
</style>
</head>

<body>

<div class="container">

<h2>Join Yoga Plan</h2>

<form onsubmit="go(event)">

<input id="name" placeholder="Name" required>
<input id="phone" placeholder="Phone" required>

<select id="plan">
<option>Morning Session</option>
<option>Evening Session</option>
</select>

<!-- UPDATED TIMINGS -->
<select id="time">
<option>7:15 AM - 8:15 AM</option>
<option>6:00 PM - 7:00 PM</option>
</select>

<button type="submit">Submit</button>
</form>

<!-- LINK BACK TO HOME PAGE -->
<a href="index.html">⬅ Back to Home</a>

</div>

<script>
function go(e){
e.preventDefault();

let n=document.getElementById('name').value;
let p=document.getElementById('phone').value;
let pl=document.getElementById('plan').value;
let t=document.getElementById('time').value;

window.location.href=`thankyou.html?name=${n}&phone=${p}&plan=${pl}&time=${t}`;
}
</script>

</body>
</html>
