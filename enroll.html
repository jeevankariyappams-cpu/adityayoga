===================== --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enroll Yoga</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins';background:linear-gradient(to right,#d4fc79,#96e6a1);margin:0;}
.container{
max-width:450px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
}
input,select{
width:100%;padding:10px;margin:10px 0;
}
button{
width:100%;padding:12px;background:#4CAF50;color:white;border:none;
}
</style>
</head>
<body><div class="container">
<h2>Join Yoga Plan</h2><form id="enrollForm">
  <input id="name" placeholder="Name" required>
  <input id="phone" placeholder="Phone" required>

  <select id="plan">
    <option>Morning Session</option>
    <option>Evening Session</option>
  </select>

  <select id="time">
    <option>8AM - 9AM</option>
    <option>7PM - 8PM</option>
  </select>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("enrollForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let n = document.getElementById('name').value;
    let p = document.getElementById('phone').value;
    let pl = document.getElementById('plan').value;
    let t = document.getElementById('time').value;

    // store data locally
    localStorage.setItem("name", n);
    localStorage.setItem("phone", p);
    localStorage.setItem("plan", pl);
    localStorage.setItem("time", t);

    // simple navigation (no query string)
    window.location.href = "thankyou.html";
});
</script>

</body>
</html>
