<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enroll Yoga</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:linear-gradient(to right,#d4fc79,#96e6a1);
}

.container{
max-width:450px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#333;
}
</style>
</head>

<body>

<div class="container">

<h2>Join Online Yoga Classes</h2>

<form id="form">

  <label>Name</label>
  <input type="text" name="name" placeholder="Enter your name" required>

  <label>Phone Number</label>
  <input type="tel" name="phone" placeholder="Enter phone number" required>

  <label>Yoga Session Plan</label>
  <select name="plan">
    <option value="Morning Classes">Morning Classes</option>
    <option value="Evening Classes">Evening Classes</option>
  </select>

  <label>Timings</label>
  <select name="timings">
    <option value="7:15 AM - 8:15 AM">7:15 AM - 8:15 AM </option>
    <option value="6:00 PM - 7:00 PM">6 PM - 7 PM</option>
  </select>

  <button type="submit">Submit</button>

</form>

<a href="index.html"><b>Back to Home</b></a>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  let data = {
    name: this.name.value,
    phone: this.phone.value,
    plan: this.plan.value,
    timings: this.timings.value
  };

  try {

    await fetch("https://script.google.com/macros/s/AKfycbxLwNJ_DiV5eR-A00HGB16RMUjE__ppUHnkadXfPoLGidMfsbDwfpxO5mgVrXFKdYnb/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    // Redirect after successful submission
    window.location.href =
`thankyou.html?name=${encodeURIComponent(data.name)}
&phone=${encodeURIComponent(data.phone)}
&plan=${encodeURIComponent(data.plan)}
&time=${encodeURIComponent(data.timings)}`;

  } catch (error) {

    alert("Submission failed. Try again.");
    console.log(error);

  }
});
</script>

</body>
</html>
